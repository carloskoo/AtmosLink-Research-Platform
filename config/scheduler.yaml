scheduler:
  loop_sleep_seconds: 5
  task_timeout_seconds: 300

tasks:
  sync_master_dataset:
    enabled: true
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.sync.build_master_dataset

  telegram_alert_sender:
    enabled: true
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.notifications.telegram_alert_sender
  
  weather_logger:
    enabled: false
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.logger.weather_logger

  radio_collector:
    enabled: false
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.radio.radio_collector

  era5_downloader:
    enabled: false
    interval_seconds: 86400
    command:
      - python3
      - -m
      - weather_station.era5.era5_downloader

  nasa_power_downloader:
    enabled: true
    interval_seconds: 86400
    command:
      - python3
      - -m
      - weather_station.weather_sources.nasa_power_downloader

  daily_backup:
    enabled: false
    interval_seconds: 86400
    command:
      - python3
      - -m
      - weather_station.backup.backup_database

  health_monitor:
    enabled: true
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.health.health_monitor

  notification_engine:
    enabled: true
    interval_seconds: 60
    command:
      - python3
      - -m
      - weather_station.notifications.notification_engine
  
  remote_backup:
    enabled: true
    interval_seconds: 900
    command:
      - python3
      - -m
      - weather_station.backup.remote_backup

 
